<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC AEC Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>WebRTC AEC Playground</h1>
  <p class="description">
    <code>echoCancellation</code> constraint の効果をデバイス・ブラウザ別に検証するツール。<br>
    スピーカーからテスト音を再生しながらマイク入力の波形を観察し、AEC の収束挙動を確認できます。
  </p>

  <section class="controls">
    <div class="control-group">
      <h2>1. テスト音源</h2>
      <div class="radio-group">
        <label><input type="radio" name="source" value="sweep" checked> スイープ (20Hz–8kHz)</label>
        <label><input type="radio" name="source" value="whitenoise"> ホワイトノイズ</label>
        <label><input type="radio" name="source" value="speech"> 音声サンプル (TTS)</label>
      </div>
      <div class="volume-control">
        <label>再生音量: <input type="range" id="volume" min="0" max="1" step="0.05" value="0.3"></label>
        <span id="volume-value">0.3</span>
      </div>
      <button id="btn-play" class="btn">再生</button>
      <button id="btn-stop" class="btn btn-secondary" disabled>停止</button>
    </div>

    <div class="control-group">
      <h2>2. マイク設定</h2>
      <div class="toggle-group">
        <label>
          <input type="checkbox" id="echo-cancellation" checked>
          echoCancellation
        </label>
        <label>
          <input type="checkbox" id="noise-suppression" checked>
          noiseSuppression
        </label>
        <label>
          <input type="checkbox" id="auto-gain-control" checked>
          autoGainControl
        </label>
      </div>
      <button id="btn-mic" class="btn">マイク開始</button>
      <button id="btn-mic-stop" class="btn btn-secondary" disabled>マイク停止</button>
    </div>

    <div class="control-group">
      <h2>3. 録音</h2>
      <button id="btn-record" class="btn" disabled>録音開始</button>
      <button id="btn-record-stop" class="btn btn-secondary" disabled>録音停止</button>
      <div id="recordings"></div>
    </div>
  </section>

  <section class="visualizer">
    <h2>波形 (時間領域)</h2>
    <canvas id="waveform" width="800" height="200"></canvas>

    <h2>スペクトログラム (周波数領域)</h2>
    <canvas id="spectrum" width="800" height="200"></canvas>
  </section>

  <section class="info">
    <h2>環境情報</h2>
    <pre id="env-info"></pre>

    <h2>現在の MediaTrackSettings</h2>
    <pre id="track-settings">マイク未開始</pre>
  </section>

  <script src="app.js"></script>
</body>
</html>
